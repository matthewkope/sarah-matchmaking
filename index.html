<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Sarah</title>
<style>
  :root {
    --bg: #f6f4f0; --card: #ffffff; --ink: #2b2b33; --muted: #6e6e7a; --line: #e7e7ee;
    --accent: #5b6ee1; --accent-soft: #e8ebfc;
    --c1: #3aa17e; --c2: #e0913a; --c3: #5b8bd4; --c4: #c25e8a; --c5: #8b5cf6;
    --radius: 14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.55; min-height: 100vh;
    display: flex; justify-content: center; padding: 24px 16px 64px;
  }
  .app { width: 100%; max-width: 640px; }
  header { text-align: center; margin-bottom: 28px; }
  header h1 { font-size: 1.7rem; margin-bottom: 6px; }
  header p { color: var(--muted); font-size: 0.95rem; }
  #account-bar { margin-top: 10px; font-size: 0.85rem; }
  .acct-muted { color: var(--muted); }
  .acct-link { background: none; border: none; color: var(--accent); font-weight: 600; cursor: pointer; font-family: inherit; font-size: 0.85rem; padding: 2px 4px; }
  .acct-link:hover { text-decoration: underline; }
  #toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 10px; font-size: 0.9rem; box-shadow: 0 8px 28px rgba(0,0,0,.25); opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 50; max-width: 90vw; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #signin-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; z-index: 100; color: var(--muted); font-size: 0.95rem; }
  #signin-overlay .spin { width: 32px; height: 32px; border: 3px solid var(--line); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .card { background: var(--card); border-radius: var(--radius); padding: 28px; box-shadow: 0 2px 12px rgba(40,40,60,0.07); }

  .quiz-card { display: flex; align-items: center; gap: 16px; width: 100%; text-align: left;
    border: 1.5px solid var(--line); border-radius: 12px; background: #fafafc; padding: 16px 18px; margin-bottom: 12px;
    cursor: pointer; transition: border-color .15s, background .15s, transform .05s; color: var(--ink); font-family: inherit; }
  .quiz-card:hover { border-color: var(--accent); background: var(--accent-soft); }
  .quiz-card:active { transform: scale(.992); }
  .quiz-emoji { font-size: 1.7rem; flex: none; width: 2rem; text-align: center; }
  .quiz-card h3 { font-size: 1.05rem; margin-bottom: 2px; }
  .quiz-card p { color: var(--muted); font-size: 0.85rem; }
  .home-tools { display: flex; justify-content: center; margin-top: 10px; }

  .progress-wrap { margin-bottom: 22px; }
  .progress-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .progress-track { height: 8px; background: #ececf2; border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; width: 0%; transition: width .3s ease; }

  .question-text { font-size: 1.15rem; font-weight: 600; margin-bottom: 22px; min-height: 2.4em; }
  .likert { display: flex; flex-direction: column; gap: 10px; }
  .likert button { display: flex; align-items: center; gap: 12px; text-align: left; padding: 13px 16px;
    border: 1.5px solid #e2e2ea; border-radius: 10px; background: #fafafc; font-size: 0.97rem; color: var(--ink);
    cursor: pointer; transition: border-color .15s, background .15s, transform .05s; font-family: inherit; }
  .likert button:hover { border-color: var(--accent); background: var(--accent-soft); }
  .likert button:active { transform: scale(.985); }
  .likert button.selected { border-color: var(--accent); background: var(--accent-soft); font-weight: 600; }
  .likert .num { flex: none; width: 26px; height: 26px; display: grid; place-items: center; border-radius: 7px;
    background: #ececf2; color: var(--muted); font-size: 0.82rem; font-weight: 700; }
  .likert button:hover .num, .likert button.selected .num { background: var(--accent); color: #fff; }

  .nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
  .nav-btn { background: none; border: none; color: var(--muted); font-size: 0.9rem; cursor: pointer; padding: 8px 12px; border-radius: 8px; }
  .nav-btn:hover { background: #f0f0f5; color: var(--ink); }
  .nav-btn:disabled { opacity: .35; cursor: default; }
  .nav-hint { font-size: 0.8rem; color: var(--muted); }

  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 24px; }
  .primary-btn { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 13px 24px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: filter .15s, transform .05s; font-family: inherit; }
  .primary-btn:hover { filter: brightness(1.08); } .primary-btn:active { transform: scale(.98); }
  .ghost-btn { background: #fff; color: var(--accent); border: 1.5px solid var(--accent); border-radius: 10px; padding: 12px 20px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background .15s; font-family: inherit; }
  .ghost-btn:hover { background: var(--accent-soft); }
  .danger-btn { background: var(--c4); color: #fff; border: none; border-radius: 10px; padding: 13px 24px; font-size: 1rem; font-weight: 600; cursor: pointer; font-family: inherit; }
  .danger-btn:hover { filter: brightness(1.06); }
  .text-btn { background: none; border: none; color: var(--muted); font-size: 0.95rem; cursor: pointer; padding: 13px 8px; font-family: inherit; }
  .text-btn:hover { color: var(--ink); text-decoration: underline; }

  .disclaimer { margin-top: 20px; font-size: 0.8rem; color: var(--muted); background: #f4f4f8; border-radius: 10px; padding: 12px 14px; }

  .result-style { font-size: 1.5rem; font-weight: 700; margin: 4px 0 6px; }
  .result-sub { color: var(--muted); font-size: 0.95rem; margin-bottom: 8px; }
  .badge { display: inline-block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; padding: 4px 10px; border-radius: 99px; color: #fff; margin-bottom: 10px; }
  .dim { margin: 14px 0; }
  .dim-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px; }
  .dim-label .score { color: var(--muted); }
  .dim-track { height: 12px; background: #ececf2; border-radius: 99px; overflow: hidden; }
  .dim-fill { height: 100%; border-radius: 99px; transition: width .8s cubic-bezier(.22,1,.36,1); width: 0%; }
  .result-desc { color: var(--ink); font-size: 0.97rem; margin: 18px 0; }
  .result-tips { background: #f4f7f4; border-radius: 10px; padding: 16px 18px; font-size: 0.92rem; }
  .result-tips h3 { font-size: 0.95rem; margin-bottom: 8px; } .result-tips ul { margin-left: 18px; } .result-tips li { margin-bottom: 5px; }
  .quad-map { margin: 24px auto 8px; display: block; }
  .typecode { font-size: 2.4rem; font-weight: 800; letter-spacing: .04em; margin: 4px 0; }
  .saved-note { margin-top: 16px; font-size: 0.9rem; color: var(--c1); background: #eef7f2; border-radius: 10px; padding: 10px 14px; }
  .mini-note { font-size: 0.8rem; color: var(--muted); margin-top: 14px; }

  /* Rice Purity checklist */
  .check-row { display: flex; gap: 11px; align-items: flex-start; padding: 9px 4px; border-bottom: 1px solid var(--line); cursor: pointer; font-size: 0.92rem; }
  .check-row:hover { background: #fafafc; }
  .check-num { flex: none; width: 1.8rem; color: var(--muted); font-size: 0.8rem; text-align: right; }
  .check-box { flex: none; width: 20px; height: 20px; border: 1.5px solid #cfcfda; border-radius: 5px; margin-top: 1px; display: grid; place-items: center; color: #fff; font-size: 0.8rem; }
  .check-row.checked .check-box { background: var(--accent); border-color: var(--accent); }
  .check-row.checked .check-text { color: var(--muted); }
  .checklist-bar { position: sticky; bottom: 0; background: var(--card); padding-top: 12px; }

  /* Answers review */
  .answers-list { margin-top: 6px; max-height: none; }
  .ans-row { padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 0.9rem; }
  .ans-q { color: var(--ink); }
  .ans-a { color: var(--accent); font-weight: 600; margin-top: 2px; }
  .ans-a.no { color: var(--muted); font-weight: 500; }

  .section-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .section-head h2 { font-size: 1.2rem; }
  .empty { color: var(--muted); text-align: center; padding: 28px 8px; }
  .person { border: 1.5px solid var(--line); border-radius: 12px; padding: 14px 16px; margin-bottom: 14px; }
  .person-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .person-name { font-weight: 700; font-size: 1.05rem; }
  .person-del { background: none; border: none; color: var(--muted); font-size: 0.8rem; cursor: pointer; }
  .person-del:hover { color: var(--c4); text-decoration: underline; }
  .person-actions { display: flex; gap: 14px; align-items: center; }
  .person-copy { background: none; border: none; color: var(--accent); font-size: 0.8rem; font-weight: 600; cursor: pointer; }
  .person-copy:hover { text-decoration: underline; }
  .json-out { width: 100%; height: 240px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.78rem; line-height: 1.45; border: 1px solid var(--line); border-radius: 8px; padding: 10px; resize: vertical; white-space: pre; box-sizing: border-box; }
  .res-row { display: flex; align-items: center; gap: 12px; padding: 9px 2px; border-top: 1px solid var(--line); }
  .res-main { flex: 1; min-width: 0; cursor: pointer; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .res-main:hover .res-label { text-decoration: underline; }
  .res-label { font-size: 0.92rem; }
  .tag { display: inline-block; font-size: 0.66rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; padding: 2px 7px; border-radius: 6px; color: #fff; }
  .pill { display: inline-block; font-size: 0.72rem; font-weight: 700; padding: 2px 9px; border-radius: 99px; color: #fff; }
  .res-del { flex: none; background: none; border: 1px solid var(--line); color: var(--muted); border-radius: 7px; padding: 5px 10px; font-size: 0.8rem; cursor: pointer; }
  .res-del:hover { border-color: var(--c4); color: var(--c4); }
  .missing { font-size: 0.85rem; color: var(--muted); margin-top: 10px; }
  .missing a { color: var(--accent); cursor: pointer; text-decoration: underline; }
  .tools-row { display: flex; gap: 10px; margin-top: 22px; flex-wrap: wrap; }
  .tools-row .ghost-btn, .tools-row .primary-btn { padding: 10px 16px; font-size: 0.88rem; }

  .modal-backdrop { position: fixed; inset: 0; background: rgba(30,30,45,.45); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 10; }
  .modal { background: var(--card); border-radius: var(--radius); padding: 24px; width: 100%; max-width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,.25); }
  .modal h3 { font-size: 1.1rem; margin-bottom: 6px; } .modal p { color: var(--muted); font-size: 0.88rem; margin-bottom: 14px; }
  .modal input { width: 100%; padding: 11px 13px; font-size: 1rem; border: 1.5px solid var(--line); border-radius: 10px; margin-bottom: 8px; color: var(--ink); font-family: inherit; }
  .modal input:focus { outline: none; border-color: var(--accent); }
  .modal .modal-error { color: var(--c4); font-size: 0.82rem; min-height: 1.1em; margin-bottom: 8px; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 6px; }

  .hidden { display: none; }
  @media (max-width: 480px) { .card { padding: 20px; } .question-text { font-size: 1.05rem; } .typecode { font-size: 2rem; } }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1 id="app-title">Personality &amp; Relationship Quizzes</h1>
    <p id="app-subtitle">Private self-reflection — nothing leaves your device</p>
    <div id="account-bar"></div>
  </header>

  <div class="card" id="screen-home">
    <p style="color: var(--muted); margin-bottom: 18px;">Pick a quiz. Save each result onto a named profile to build a full picture of yourself or someone else.</p>
    <div id="home-cards"></div>
    <div class="home-tools">
      <button class="ghost-btn" id="home-profiles-btn" onclick="showProfiles()">Saved profiles</button>
    </div>
    <div class="disclaimer" id="home-disclaimer"></div>
  </div>

  <div class="card hidden" id="screen-quiz">
    <div class="progress-wrap">
      <div class="progress-label"><span id="progress-text">Question 1</span><span id="progress-pct">0%</span></div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="likert" id="options"></div>
    <div class="nav-row">
      <button class="nav-btn" id="back-btn" onclick="goBack()">&#8592; Back</button>
      <span class="nav-hint" id="nav-hint"></span>
    </div>
  </div>

  <div class="card hidden" id="screen-checklist">
    <div class="section-head"><h2 id="checklist-title">Checklist</h2><button class="text-btn" onclick="showHome()">&#8592; Home</button></div>
    <p class="result-sub" id="checklist-intro"></p>
    <div id="checklist"></div>
    <div class="btn-row checklist-bar">
      <button class="primary-btn" id="checklist-calc">See my score</button>
      <span class="nav-hint" id="checklist-count"></span>
    </div>
  </div>

  <div class="card hidden" id="screen-results">
    <div id="result-body"></div>
    <div class="saved-note hidden" id="saved-note"></div>
    <div class="btn-row" id="result-actions"></div>
  </div>

  <div class="card hidden" id="screen-profiles">
    <div class="section-head"><h2>Saved profiles</h2><button class="text-btn" onclick="showHome()">&#8592; Home</button></div>
    <div id="profiles-list"></div>
    <div class="tools-row">
      <button class="ghost-btn" onclick="exportProfiles()">Export to file</button>
      <button class="ghost-btn" onclick="importProfiles()">Import from file</button>
    </div>
  </div>
</div>
<input type="file" id="file-import" accept="application/json,.json" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ════════════════════════════════════════════════════════════════════
//  SHARED 5-POINT AGREE/DISAGREE SCALE
// ════════════════════════════════════════════════════════════════════
const SCALE = [
  { label: "Strongly disagree", value: 1 }, { label: "Disagree", value: 2 },
  { label: "Neutral", value: 3 }, { label: "Agree", value: 4 }, { label: "Strongly agree", value: 5 }
];

// ════════════════════════════════════════════════════════════════════
//  1. ATTACHMENT STYLE
// ════════════════════════════════════════════════════════════════════
const ATTACH_QUESTIONS = [
  { text: "I worry about being abandoned by people I'm close to.", dim: "anx", reverse: false },
  { text: "I find it easy to depend on partners or close friends.", dim: "avo", reverse: true },
  { text: "I worry that romantic partners won't care about me as much as I care about them.", dim: "anx", reverse: false },
  { text: "I prefer not to show others how I feel deep down.", dim: "avo", reverse: false },
  { text: "I often need a lot of reassurance that I am loved.", dim: "anx", reverse: false },
  { text: "I feel comfortable sharing my private thoughts and feelings with a partner.", dim: "avo", reverse: true },
  { text: "When someone I'm close to is unavailable, I fear they're losing interest in me.", dim: "anx", reverse: false },
  { text: "I get uncomfortable when someone wants to be very emotionally close to me.", dim: "avo", reverse: false },
  { text: "I rarely worry about my relationships ending.", dim: "anx", reverse: true },
  { text: "I find it difficult to allow myself to depend on others.", dim: "avo", reverse: false },
  { text: "If I can't reach someone I care about, I assume something is wrong between us.", dim: "anx", reverse: false },
  { text: "I tell the people I'm close to just about everything.", dim: "avo", reverse: true },
  { text: "My desire to be very close sometimes scares people away.", dim: "anx", reverse: false },
  { text: "I pull away when a partner starts to get too close.", dim: "avo", reverse: false },
  { text: "I feel confident that the people I love will be there when I need them.", dim: "anx", reverse: true },
  { text: "It helps me to turn to the people I'm close to in times of need.", dim: "avo", reverse: true },
  { text: "I get frustrated when partners aren't around as much as I would like.", dim: "anx", reverse: false },
  { text: "I prefer to deal with problems on my own rather than ask for support.", dim: "avo", reverse: false },
  { text: "I sometimes feel that I push people to show more feeling and commitment than they want to.", dim: "anx", reverse: false },
  { text: "Being depended on by others makes me feel uneasy.", dim: "avo", reverse: false },
  { text: "I don't often worry about being rejected.", dim: "anx", reverse: true },
  { text: "I am comfortable being emotionally close to other people.", dim: "avo", reverse: true },
  { text: "When I'm not in a relationship, I feel somewhat anxious and incomplete.", dim: "anx", reverse: false },
  { text: "It's important to me to feel self-sufficient rather than rely on a partner.", dim: "avo", reverse: false }
];
const STYLES = {
  secure: { name: "Secure", color: "#3aa17e",
    desc: "You appear comfortable with both intimacy and independence. You can depend on others and let them depend on you without losing your sense of self, and you don't spend much energy worrying about rejection.",
    tips: ["Keep investing in open communication — it's your natural strength.", "Offer steady reassurance to partners with different attachment patterns.", "Security isn't fixed; under high stress, keep tending your support network."] },
  anxious: { name: "Anxious-Preoccupied", color: "#e0913a",
    desc: "You deeply value closeness but worry about whether others are as committed as you are. You're attuned to small shifts in a partner's mood and seek reassurance when you sense distance.",
    tips: ["When anxiety spikes, ask: what do I know vs. what am I assuming?", "Self-soothe before seeking reassurance.", "State needs directly instead of testing or hinting.", "Build a fulfilling life outside the relationship."] },
  avoidant: { name: "Dismissive-Avoidant", color: "#5b8bd4",
    desc: "You prize independence and may feel crowded by too much emotional closeness. You handle stress on your own and may downplay your need for connection — which is still there underneath.",
    tips: ["Experiment with small disclosures before withdrawing.", "Name your need for space instead of going silent.", "Accepting support doesn't erase your independence.", "Schedule connection deliberately."] },
  fearful: { name: "Fearful-Avoidant", color: "#c25e8a",
    desc: "You both long for closeness and feel wary of it, wanting connection while bracing to be hurt. This can look like getting close fast then withdrawing, or cycling between trust and doubt.",
    tips: ["Go slowly: build trust in small, repeated steps.", "Label the urge to flee or cling as your attachment alarm.", "Choose consistent, patient people.", "This pattern responds especially well to therapy."] }
};
function attachCompute(answers) {
  let aS=0,aN=0,vS=0,vN=0;
  ATTACH_QUESTIONS.forEach((q,i)=>{ let v=answers[i]; if(v==null) return; if(q.reverse) v=6-v; if(q.dim==="anx"){aS+=v;aN++;}else{vS+=v;vN++;} });
  return { anxiety:aS/aN, avoidance:vS/vN };
}
function attachClassify(a,v){ const ha=a>=3,hv=v>=3; if(!ha&&!hv)return"secure"; if(ha&&!hv)return"anxious"; if(!ha&&hv)return"avoidant"; return"fearful"; }

// ════════════════════════════════════════════════════════════════════
//  2. LOVE LANGUAGE  (forced-choice; official balanced round-robin)
// ════════════════════════════════════════════════════════════════════
const LOVE_KEYS = ["words","quality","gifts","service","touch"];
const LOVE_NAMES = { words:"Words of Affirmation", quality:"Quality Time", gifts:"Receiving Gifts", service:"Acts of Service", touch:"Physical Touch" };
const LOVE_COLORS = { words:"#5b6ee1", quality:"#3aa17e", gifts:"#c25e8a", service:"#e0913a", touch:"#8b5cf6" };
const LOVE_STATEMENTS = {
  words: ["someone tells me they're proud of me","a partner gives me a heartfelt compliment","I hear the words “I love you” out loud","someone notices my effort and says so","a partner leaves me an encouraging note","someone speaks kindly about me to others","I'm reassured with warm, supportive words","a partner thanks me sincerely for something I did","someone tells me what they appreciate about me","I get a genuine “you did a great job”","a partner encourages me when I'm doubting myself","someone puts their feelings for me into words"],
  quality: ["a partner sets everything aside to be fully present with me","we spend uninterrupted time together","someone gives me their complete, undistracted attention","we take a walk or a trip together, just the two of us","a partner really listens without checking their phone","we share a long, unhurried conversation","someone makes dedicated time for me in a busy week","we do an activity together that we both enjoy","a partner plans a day for just the two of us","we sit together and talk about how we're really doing","someone chooses to be with me over other plans","we have a regular time that's ours alone"],
  gifts: ["someone surprises me with a thoughtful gift","a partner brings me a small token that made them think of me","I receive a present chosen just for me","someone remembers something I wanted and gets it for me","a partner gives me a meaningful keepsake","I get a surprise treat for no special reason","someone marks an occasion with a gift","a partner picks up something I mentioned in passing","I receive a gift that shows real thought went into it","someone hands me a little something to brighten my day","a partner saves a memento from a moment we shared","I'm given a present that reflects who I am"],
  service: ["a partner helps me with a task without being asked","someone takes a chore off my plate","a partner does something practical to make my day easier","someone steps in to help when I'm overwhelmed","a partner handles something so I don't have to","someone sorts out a problem for me","a partner pitches in with the work I'm dreading","someone goes out of their way to lighten my load","a partner runs an errand to help me out","someone cooks or cleans to take care of me","a partner notices what needs doing and just does it","someone helps me finish something I'm stuck on"],
  touch: ["a partner holds my hand","someone greets me with a warm hug","a partner sits close so we're physically near","I get a reassuring touch on the shoulder or arm","a partner cuddles up with me","someone hugs me when I've had a hard day","a partner puts an arm around me","we're close enough to feel each other's presence","someone gives me a spontaneous embrace","a partner rests a hand on me affectionately","we sit shoulder to shoulder","a partner greets me with a kiss hello or goodbye"]
};
const LOVE_INFO = {

      if(error) throw error;
    }
  }catch(err){ console.error("cloud sync failed", err); toast("Cloud sync failed — try again when online."); }
}
const round2 = x => Math.round(x*100)/100;
function localStamp(){ const d=new Date(),p=n=>String(n).padStart(2,"0"); return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+"T"+p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds()); }
function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

//  AUTH + CLOUD SYNC
// ════════════════════════════════════════════════════════════════════
function oauthReturning(){ return /[?&]code=/.test(location.search) || /access_token=/.test(location.hash); }
let signinTimer=null;
function showSigningIn(){
  if($("signin-overlay")) return;
  const o=document.createElement("div"); o.id="signin-overlay";
  o.innerHTML='<div class="spin"></div><p>Finishing sign-in…</p>';
  document.body.appendChild(o);
  signinTimer=setTimeout(hideSigningIn, 15000);   // safety: never stick
}
function hideSigningIn(){ const o=$("signin-overlay"); if(o) o.remove(); if(signinTimer){ clearTimeout(signinTimer); signinTimer=null; } }

async function initAuth(){
  if(!sb){ refreshAccountUI(); return; }
  if(oauthReturning()) showSigningIn();   // show a working state while OAuth completes
  const { data } = await sb.auth.getSession();
  await applySession(data.session);
  hideSigningIn();
  if(oauthReturning()){ try{ history.replaceState({}, "", location.origin + location.pathname); }catch(e){} }
  sb.auth.onAuthStateChange((_evt, session)=>{ applySession(session); });
}
let appliedUserId = null;
async function applySession(session){
  const uid = (session && session.user) ? session.user.id : null;
  if(uid && uid === appliedUserId) return;   // same user already loaded — skip the duplicate pull
  const was = authUser;
  authUser = (session && session.user) || null;
  appliedUserId = uid;
  if(authUser){
    const localBefore = readLocal();   // what's saved on this device before we load the cloud
    profilesCache = readCloudCache(authUser.id) || [];   // instant: render the last-known snapshot
    refreshAccountUI();
    rerenderCurrent();
    pullRemote().then(() => {           // refresh from the network in the background (non-blocking)
      refreshAccountUI();
      rerenderCurrent();
      maybeOfferMigration(localBefore);
    });
    return;
  }
  if(was){ profilesCache = readLocal(); clearCloudCache(); }   // signed out → local; drop cloud snapshot
  refreshAccountUI();
  rerenderCurrent();
}

// If this device has saved profiles that aren't in the just-signed-in account,
// offer to upload them — this is how you move local profiles into an account.
function maybeOfferMigration(localEntries){
  if(!localEntries || !localEntries.length) return;
  const cloudKeys = new Set((profilesCache||[]).map(entryKey));
  const toMigrate = localEntries.filter(e => !cloudKeys.has(entryKey(e)));
  if(!toMigrate.length) return;
  const names = [...new Set(toMigrate.map(e => e.name || "?"))].join(", ");
  openDialog({
    title: "Add this device's profiles to your account?",
    message: toMigrate.length + " saved result(s) on this device (" + names + ") aren't in your account yet. Add them so they sync everywhere?",
    confirmLabel: "Add to account", cancelLabel: "Not now",
    onConfirm: async () => {
      try{
        const rows = toMigrate.map(e => ({ profile_name: e.name, quiz: e.quiz||"attachment", payload: e }));
        const { error } = await sb.from("results").upsert(rows, { onConflict:"owner,profile_name,quiz" });
        if(error) throw error;
        const keys = new Set((profilesCache||[]).map(entryKey));
        profilesCache = (profilesCache||[]).concat(toMigrate.filter(e=>!keys.has(entryKey(e))));
        toast("Added " + toMigrate.length + " result(s) to your account.");
        rerenderCurrent();
      }catch(err){ console.error(err); toast("Couldn't add them — try again."); }
    }
  });
}
async function pullRemote(){
  try{
    const { data, error } = await sb.from("results").select("payload").order("updated_at",{ascending:true});
    if(error) throw error;
    profilesCache = (data||[]).map(r=>r.payload).filter(Boolean);
    if(authUser) writeCloudCache(authUser.id, profilesCache);
  }catch(err){ console.error("cloud load failed", err); toast("Couldn't refresh cloud profiles — showing the last synced copy."); }
}
function rerenderCurrent(){
  if(currentScreen==="screen-home") showHome();
  else if(currentScreen==="screen-profiles") showProfiles();
}
function refreshAccountUI(){
  const bar=$("account-bar"); if(!bar) return;
  if(!sb){ bar.innerHTML='<span class="acct-muted">Cloud sync unavailable — results save on this device.</span>'; return; }
  if(authUser){
    bar.innerHTML='<span class="acct-muted">☁ Synced as <strong>'+escapeHtml(authUser.email||"you")+'</strong></span> <button class="acct-link" id="acct-signout">Sign out</button>';
    $("acct-signout").onclick=async()=>{ await sb.auth.signOut(); toast("Signed out."); };
  } else {
    bar.innerHTML='<span class="acct-muted">Saving locally on this device.</span> <button class="acct-link" id="acct-signin">Sign in / Sign up to sync</button>';
    $("acct-signin").onclick=openAuthModal;
  }
}

function openAuthModal(){
  if(!sb) return;
  let mode="signin"; // or "signup"
  const backdrop=document.createElement("div"); backdrop.className="modal-backdrop";
  backdrop.innerHTML='<div class="modal"><h3 id="auth-title">Sign in</h3>'+
    '<p id="auth-sub">Sign in to sync your profiles across devices and the CLI.</p>'+
    '<input id="auth-email" type="email" placeholder="you@example.com" autocomplete="username">'+
    '<input id="auth-pw" type="password" placeholder="password (min 6 chars)" autocomplete="current-password">'+
    '<div class="modal-error" id="auth-error"></div>'+
    '<div class="modal-actions"><button class="text-btn" id="auth-toggle">Create an account</button>'+
    '<button class="primary-btn" id="auth-go">Sign in</button></div></div>';
  document.body.appendChild(backdrop);
  const close=()=>backdrop.remove();
  const setMode=m=>{ mode=m;
    $("auth-title").textContent = m==="signin"?"Sign in":"Create account";
    $("auth-go").textContent = m==="signin"?"Sign in":"Create account";
    $("auth-toggle").textContent = m==="signin"?"Create an account":"I already have an account";
    $("auth-sub").textContent = m==="signin"?"Sign in to sync your profiles across devices and the CLI.":"Create an account to save your profiles to the cloud and the CLI.";
    $("auth-error").textContent="";
  };
  const go=async()=>{
    const email=$("auth-email").value.trim(), pw=$("auth-pw").value;
    if(!email||!pw){ $("auth-error").textContent="Enter an email and password."; return; }
    $("auth-go").disabled=true; $("auth-error").textContent="Working…";
    try{
      const fn = mode==="signin" ? sb.auth.signInWithPassword({email,password:pw}) : sb.auth.signUp({email,password:pw});
      const { data, error } = await fn;
      if(error) throw error;
      if(mode==="signup" && !data.session){ $("auth-error").textContent="Account created — check your email for a confirmation link, then sign in."; setMode("signin"); $("auth-go").disabled=false; return; }
      close(); toast(mode==="signin"?"Signed in.":"Account created — synced.");
    }catch(err){ $("auth-error").textContent=err.message||"Authentication failed."; $("auth-go").disabled=false; }
  };
  $("auth-toggle").onclick=()=>setMode(mode==="signin"?"signup":"signin");
  $("auth-go").onclick=go;
  backdrop.onclick=e=>{ if(e.target===backdrop) close(); };
  ["auth-email","auth-pw"].forEach(id=>$(id).addEventListener("keydown",e=>{ if(e.key==="Enter") go(); if(e.key==="Escape") close(); }));
  $("auth-email").focus();
}

let toastTimer=null;
function toast(msg){
  let t=$("toast"); if(!t){ t=document.createElement("div"); t.id="toast"; document.body.appendChild(t); }
  t.textContent=msg; t.classList.add("show");
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove("show"), 3200);
}

function startQuiz(id){
  active=id; current=0; answers=new Array(QUIZZES[id].questions.length).fill(null);
  if(QUIZZES[id].type==="binary"){ showChecklist(); return; }
  setHeader(QUIZZES[id].title, QUIZZES[id].type==="choice"?"Pick the option that fits you better":"Rate how much you agree");
  showScreen("screen-quiz"); renderQuestion();
}

function showChecklist(){
  const quiz=QUIZZES[active];
  answers=new Array(quiz.questions.length).fill(false);
  setHeader(quiz.title, "Check everything you've done");
  $("checklist-title").textContent=quiz.title;
  $("checklist-intro").textContent="Check every item you've done. Your score is 100 minus the number you check — be honest, it's just for fun.";
  const wrap=$("checklist"); wrap.innerHTML="";
  quiz.questions.forEach((text,i)=>{
    const row=document.createElement("div"); row.className="check-row";
    row.innerHTML='<span class="check-num">'+(i+1)+'</span><span class="check-box">✓</span><span class="check-text">'+escapeHtml(text)+'</span>';
    row.onclick=()=>{ answers[i]=!answers[i]; row.classList.toggle("checked", answers[i]); updateChecklistCount(); };
    wrap.appendChild(row);
  });
  updateChecklistCount();
  $("checklist-calc").onclick=()=>showResults();
  showScreen("screen-checklist");
}
function updateChecklistCount(){ const n=answers.filter(Boolean).length; $("checklist-count").textContent=n+" checked · score would be "+(100-n); }
function renderQuestion(){
  const quiz=QUIZZES[active], total=quiz.questions.length;
  $("progress-text").textContent="Question "+(current+1)+" of "+total;
  const pct=Math.round(current/total*100);
  $("progress-pct").textContent=pct+"%"; $("progress-fill").style.width=pct+"%";
  $("back-btn").disabled=current===0;
  const wrap=$("options"); wrap.innerHTML="";
  if(quiz.type==="likert"){
    $("question-text").textContent=quiz.questions[current].text;
    $("nav-hint").textContent="Tip: press keys 1–5";
    SCALE.forEach(opt=>{
      const btn=document.createElement("button");
      btn.innerHTML='<span class="num">'+opt.value+'</span><span>'+opt.label+'</span>';
      if(answers[current]===opt.value) btn.classList.add("selected");
      btn.onclick=()=>selectAnswer(opt.value);
      wrap.appendChild(btn);
    });
  } else {
    $("question-text").textContent="It's more meaningful to me when…";
    $("nav-hint").textContent="Tip: press 1 or 2";
    const q=quiz.questions[current];
    [["1",q.a],["2",q.b]].forEach(([n,opt])=>{
      const btn=document.createElement("button");
      btn.innerHTML='<span class="num">'+n+'</span><span>'+escapeHtml(opt.text)+'</span>';
      if(answers[current]===opt.lang) btn.classList.add("selected");
      btn.onclick=()=>selectAnswer(opt.lang);
      wrap.appendChild(btn);
    });
  }
}
function selectAnswer(v){ answers[current]=v; if(current<QUIZZES[active].questions.length-1){current++; renderQuestion();} else showResults(); }
function goBack(){ if(current>0){current--; renderQuestion();} }

// dispatch table: per-quiz compute + render + summary used everywhere
const QUIZ_RESULT = {
  attachment: {
    compute: ans => { const {anxiety,avoidance}=attachCompute(ans); const style=attachClassify(anxiety,avoidance); return {quiz:"attachment", style, anxiety:round2(anxiety), avoidance:round2(avoidance)}; },
    fromEntry: p => { const a=p.answers; if(Array.isArray(a)&&a.length===ATTACH_QUESTIONS.length&&a.every(v=>v)){const {anxiety,avoidance}=attachCompute(a);return{anxiety,avoidance,style:attachClassify(anxiety,avoidance)};} return {anxiety:+p.anxiety||0,avoidance:+p.avoidance||0,style:p.style||"secure"}; },
    label: r => STYLES[r.style].name, color: r => STYLES[r.style].color,
    render: (r,badge) => renderAttachmentBody(r.anxiety, r.avoidance, r.style, badge)
  },
  love: {
    compute: ans => { const s=loveCompute(ans); return {quiz:"love", primary:lovePrimary(s)[0], scores:s}; },
    fromEntry: p => { const a=p.answers; const s=(Array.isArray(a)&&a.length===LOVE_QUESTIONS.length&&a.every(v=>v))?loveCompute(a):(p.scores||{}); return {scores:s}; },
    label: r => LOVE_NAMES[lovePrimary(r.scores)[0]], color: r => LOVE_COLORS[lovePrimary(r.scores)[0]],
    render: (r,badge) => renderLoveBody(r.scores, badge)
  },
  bigfive: {
    compute: ans => { const {pct}=big5Compute(ans); return {quiz:"bigfive", pct}; },
    fromEntry: p => { const a=p.answers; if(Array.isArray(a)&&a.length===BIG5_QUESTIONS.length&&a.every(v=>v)) return {pct:big5Compute(a).pct}; return {pct:p.pct||{}}; },
    label: r => { const top=BIG5_FACTORS.slice().sort((a,b)=>r.pct[b]-r.pct[a])[0]; return "High "+BIG5_INFO[top].name; }, color: r => { const top=BIG5_FACTORS.slice().sort((a,b)=>r.pct[b]-r.pct[a])[0]; return BIG5_INFO[top].color; },
    render: (r,badge) => renderBig5Body(r.pct, badge)
  },
  darktriad: {
    compute: ans => { const r=dtCompute(ans); return {quiz:"darktriad", mean:r.mean, pct:r.pct}; },
    fromEntry: p => { const a=p.answers; if(Array.isArray(a)&&a.length===DT_QUESTIONS.length&&a.every(v=>v)) return dtCompute(a); return {mean:p.mean||{}, pct:p.pct||{}}; },
    label: r => { const top=DT_TRAITS.slice().sort((a,b)=>r.pct[b]-r.pct[a])[0]; return "High "+DT_INFO[top].name; }, color: r => { const top=DT_TRAITS.slice().sort((a,b)=>r.pct[b]-r.pct[a])[0]; return DT_INFO[top].color; },
    render: (r,badge) => renderDarkBody(r, badge)
  },
  mbti: {
    compute: ans => { const r=mbtiCompute(ans); return {quiz:"mbti", type:r.type, full:r.full, axes:r.axes}; },
    fromEntry: p => { const a=p.answers; if(Array.isArray(a)&&a.length===MBTI_QUESTIONS.length&&a.every(v=>v)) return mbtiCompute(a); return {type:(p.type||"----").slice(0,4), full:p.full||p.type||"----", axes:p.axes||{}}; },
    label: r => r.full, color: r => MBTI_GROUPS[mbtiGroup(r.type)].color,
    render: (r,badge) => renderMbtiBody(r, badge)
  },
  rice: {
    compute: ans => { const r=riceCompute(ans); return {quiz:"rice", score:r.score, yes:r.yes}; },
    fromEntry: p => { const a=p.answers; if(Array.isArray(a)&&a.length===RICE_QUESTIONS.length) return riceCompute(a); return {score:(p.score!=null?+p.score:0), yes:100-(p.score!=null?+p.score:0)}; },
    label: r => "Purity "+r.score, color: r => "#5b6ee1",
    render: (r,badge) => renderRiceBody(r, badge)
  }
};

function renderRiceBody(r, badge){
  const b=riceBand(r.score);
  $("result-body").innerHTML=
    '<span class="badge" style="background:#5b6ee1">'+escapeHtml(badge||"Rice Purity")+'</span>'+
    '<div class="typecode" style="color:#5b6ee1">'+r.score+'<span style="font-size:1.1rem;color:var(--muted)"> / 100</span></div>'+
    '<p class="result-sub">'+escapeHtml(b.label)+'</p>'+
    bar("Purity score", r.score+" / 100", r.score, "#5b6ee1")+
    '<p class="result-desc">'+escapeHtml(b.desc)+'</p>'+
    '<p class="mini-note">You checked '+r.yes+' of 100 items. A higher score means more "innocent." This is a lighthearted checklist, not a judgment of any kind.</p>';
  animateBars();
}

function resultActions(mode, ctx){
  const a=$("result-actions"); a.innerHTML=""; $("saved-note").classList.add("hidden");
  if(mode==="saved"){ addBtn(a,"Back to profiles","ghost-btn",showProfiles); }
  else { addBtn(a,"Save to profile","primary-btn",openSaveModal); addBtn(a,"Saved profiles","ghost-btn",showProfiles); }
  if(ctx) addBtn(a,"View answers","ghost-btn",()=>showAnswers(ctx));
  addBtn(a,"Retake","text-btn",()=>startQuiz(active));
  showScreen("screen-results");
}
function addBtn(parent,label,cls,fn){ const b=document.createElement("button"); b.className=cls; b.textContent=label; b.onclick=fn; parent.appendChild(b); }

function showResults(){
  const res=QUIZ_RESULT[active].compute(answers);
  lastResult=Object.assign({}, res, { answers:answers.slice() });
  showFresh();
}
function showFresh(){
  QUIZ_RESULT[active].render(lastResult, null);
  resultActions("fresh", { quiz:lastResult.quiz, answers:lastResult.answers, back:showFresh });
}

// list each question with the answer the person gave
function answerRows(quiz, ans){
  ans = ans || [];
  if(quiz==="rice") return RICE_QUESTIONS.map((t,i)=>({q:t, a:ans[i]?"Yes":"No", no:!ans[i]}));
  if(quiz==="love") return LOVE_QUESTIONS.map((q,i)=>{ const opt=q.a.lang===ans[i]?q.a:(q.b.lang===ans[i]?q.b:null); return {q:"It's more meaningful to me when…", a:opt?opt.text:"—"}; });
  const qs=QUIZZES[quiz].questions;
  return qs.map((q,i)=>({q:q.text, a:(ans[i]!=null&&SCALE[ans[i]-1])?SCALE[ans[i]-1].label:"—"}));
}
function showAnswers(ctx){
  const rows=answerRows(ctx.quiz, ctx.answers);
  let h='<div class="result-style">Your answers</div><p class="result-sub">'+escapeHtml(QUIZZES[ctx.quiz].title)+' · '+rows.length+' questions</p><div class="answers-list">';
  rows.forEach((r,i)=>{ h+='<div class="ans-row"><div class="ans-q">'+(i+1)+'. '+escapeHtml(r.q)+'</div><div class="ans-a'+(r.no?' no':'')+'">'+escapeHtml(r.a)+'</div></div>'; });
  h+='</div>';
  $("result-body").innerHTML=h;
  const a=$("result-actions"); a.innerHTML=""; $("saved-note").classList.add("hidden");
  addBtn(a,"Back","ghost-btn",ctx.back);
  showScreen("screen-results");
}

// ════════════════════════════════════════════════════════════════════
//  SAVING  (results stored as flat entries keyed by name+quiz; the
//  profiles screen groups them per person)
// ════════════════════════════════════════════════════════════════════
function openSaveModal(){
  if(!lastResult) return;
  const names=[...new Set(loadProfiles().map(p=>p.name).filter(Boolean))];
  const datalist = names.length ? '<datalist id="name-suggest">'+names.map(n=>'<option value="'+escapeHtml(n)+'">').join("")+'</datalist>' : '';
  const backdrop=document.createElement("div"); backdrop.className="modal-backdrop";
  backdrop.innerHTML='<div class="modal"><h3>Save to a profile</h3>'+
    '<p>Use a new name, or an existing one to add this result to that profile.</p>'+
    '<input id="profile-name" type="text" placeholder="e.g. Matt" maxlength="40" autocomplete="off" list="name-suggest">'+datalist+
    '<div class="modal-error" id="modal-error"></div>'+
    '<div class="modal-actions"><button class="text-btn" id="modal-cancel">Cancel</button><button class="primary-btn" id="modal-save">Save</button></div></div>';
  document.body.appendChild(backdrop);
  const input=$("profile-name"); input.focus();
  const close=()=>backdrop.remove();
  const commit=()=>{
    const name=input.value.trim();
    if(!name){ $("modal-error").textContent="Please enter a name."; input.focus(); return; }
    const profiles=loadProfiles();
    const idx=profiles.findIndex(p=>(p.name||"").toLowerCase()===name.toLowerCase() && (p.quiz||"attachment")===lastResult.quiz);
    const entry=Object.assign({name, saved_at:localStamp()}, lastResult);
    let verb="Saved";
    if(idx>=0){ profiles[idx]=entry; verb="Updated"; } else profiles.push(entry);
    writeProfiles(profiles); close();
    const note=$("saved-note"); note.textContent=verb+" to “"+name+"” ✓ — "+QUIZZES[lastResult.quiz].title; note.classList.remove("hidden");
  };
  $("modal-cancel").onclick=close; $("modal-save").onclick=commit;
  backdrop.onclick=e=>{ if(e.target===backdrop) close(); };
  input.addEventListener("keydown",e=>{ if(e.key==="Enter") commit(); if(e.key==="Escape") close(); });
}

// ════════════════════════════════════════════════════════════════════
//  STYLED DIALOG
// ════════════════════════════════════════════════════════════════════
function openDialog(opts){
  const backdrop=document.createElement("div"); backdrop.className="modal-backdrop";
  const cancel=opts.cancelLabel?'<button class="text-btn" id="dlg-cancel">'+escapeHtml(opts.cancelLabel)+'</button>':'';
  backdrop.innerHTML='<div class="modal"><h3>'+escapeHtml(opts.title||"")+'</h3>'+(opts.message?'<p>'+escapeHtml(opts.message)+'</p>':'')+
    '<div class="modal-actions">'+cancel+'<button class="'+(opts.danger?'danger-btn':'primary-btn')+'" id="dlg-ok">'+escapeHtml(opts.confirmLabel||"OK")+'</button></div></div>';
  document.body.appendChild(backdrop);
  const close=()=>{ backdrop.remove(); document.removeEventListener("keydown",onKey); };
  const confirm=()=>{ close(); if(opts.onConfirm) opts.onConfirm(); };
  function onKey(e){ if(e.key==="Escape") close(); }
  const c=$("dlg-cancel"); if(c) c.onclick=close;
  $("dlg-ok").onclick=confirm; $("dlg-ok").focus();
  backdrop.onclick=e=>{ if(e.target===backdrop) close(); };
  document.addEventListener("keydown",onKey);
}

// ════════════════════════════════════════════════════════════════════
//  PROFILES  (grouped per person)
// ════════════════════════════════════════════════════════════════════
function entryResult(p){ const q=p.quiz||"attachment"; return QUIZ_RESULT[q]?QUIZ_RESULT[q].fromEntry(p):null; }

function showProfiles(){
  const profiles=loadProfiles();
  setHeader("Saved profiles","Each profile collects that person's test results");
  const list=$("profiles-list"); list.innerHTML="";
  if(!profiles.length){ list.innerHTML='<div class="empty">No saved profiles yet.<br>Take a quiz and tap “Save to profile.”</div>'; showScreen("screen-profiles"); return; }
  // group by name (case-insensitive), keep underlying indices
  const groups=new Map();
  profiles.forEach((p,idx)=>{ const key=(p.name||"?").toLowerCase(); if(!groups.has(key)) groups.set(key,{name:p.name||"?", items:[]}); groups.get(key).items.push({p,idx}); });
  groups.forEach(group=>{
    const card=document.createElement("div"); card.className="person";
    const head=document.createElement("div"); head.className="person-head";
    head.innerHTML='<span class="person-name">'+escapeHtml(group.name)+'</span>';
    const actions=document.createElement("div"); actions.className="person-actions";
    const copyBtn=document.createElement("button"); copyBtn.className="person-copy"; copyBtn.textContent="Copy JSON";
    copyBtn.title="Copy this profile as JSON to paste into ChatGPT";
    copyBtn.onclick=()=>copyProfileJSON(group.name);
    const delAll=document.createElement("button"); delAll.className="person-del"; delAll.textContent="Delete profile";
    delAll.onclick=()=>deletePerson(group.name);
    actions.appendChild(copyBtn); actions.appendChild(delAll);
    head.appendChild(actions); card.appendChild(head);

    const taken=new Set();
    group.items.forEach(({p,idx})=>{
      const q=p.quiz||"attachment"; taken.add(q);
      const cfg=QUIZ_RESULT[q]; const r=cfg?cfg.fromEntry(p):null;
      const row=document.createElement("div"); row.className="res-row";
      const main=document.createElement("div"); main.className="res-main";
      const label=r?cfg.label(r):"?"; const color=r?cfg.color(r):"#999";
      main.innerHTML='<span class="tag" style="background:'+QUIZZES[q].tag+'">'+QUIZZES[q].title+'</span>'+
        '<span class="res-label">'+escapeHtml(label)+'</span>';
      main.onclick=()=>viewEntry(idx);
      const del=document.createElement("button"); del.className="res-del"; del.textContent="✕";
      del.title="Remove this result"; del.onclick=e=>{ e.stopPropagation(); deleteEntry(idx); };
      row.appendChild(main); row.appendChild(del); card.appendChild(row);
    });
    // show which quizzes are still missing, as quick links
    const missing=QUIZ_ORDER.filter(q=>!taken.has(q));
    if(missing.length){
      const m=document.createElement("div"); m.className="missing";
      m.innerHTML="Not yet taken: "+missing.map(q=>'<a data-q="'+q+'">'+QUIZZES[q].title+'</a>').join(", ");
      m.querySelectorAll("a").forEach(a=>a.onclick=()=>startQuiz(a.dataset.q));
      card.appendChild(m);
    }
    list.appendChild(card);
  });
  showScreen("screen-profiles");
}

function viewEntry(idx){
  const p=loadProfiles()[idx]; if(!p) return;
  const q=p.quiz||"attachment"; const cfg=QUIZ_RESULT[q];
  active=q;
  setHeader(QUIZZES[q].title, "Saved result for "+(p.name||"profile"));
  cfg.render(cfg.fromEntry(p), p.name||"Profile");
  resultActions("saved", { quiz:q, answers:p.answers||[], back:()=>viewEntry(idx) });
}
function deleteEntry(idx){
  const p=loadProfiles()[idx]; if(!p) return;
  openDialog({ title:"Remove this result?", message:"Remove the "+QUIZZES[p.quiz||"attachment"].title+" result from “"+(p.name||"?")+"”?",
    confirmLabel:"Remove", cancelLabel:"Cancel", danger:true,
    onConfirm:()=>{ const a=loadProfiles(); a.splice(idx,1); writeProfiles(a); showProfiles(); } });
}
function deletePerson(name){
  openDialog({ title:"Delete profile?", message:"“"+name+"” and all its saved results will be permanently removed.",
    confirmLabel:"Delete", cancelLabel:"Cancel", danger:true,
    onConfirm:()=>{ const a=loadProfiles().filter(p=>(p.name||"").toLowerCase()!==name.toLowerCase()); writeProfiles(a); showProfiles(); } });
}

// ════════════════════════════════════════════════════════════════════
//  COPY A PROFILE AS JSON  (for pasting into ChatGPT / any LLM)
// ════════════════════════════════════════════════════════════════════
// Readable computed scores for one saved entry (names spelled out, not codes).
function analysisDetail(p){
  const q=p.quiz||"attachment"; const r=QUIZ_RESULT[q].fromEntry(p);
  if(q==="love"){ const s=r.scores||{}; const top=lovePrimary(s)[0];
    return { primary_language:LOVE_NAMES[top], scores:Object.fromEntries(LOVE_KEYS.map(k=>[LOVE_NAMES[k], s[k]||0])) }; }
  if(q==="bigfive"){ return { percentiles:Object.fromEntries(BIG5_FACTORS.map(f=>[BIG5_INFO[f].name, r.pct[f]||0])) }; }
  if(q==="darktriad"){ return { mean_1to5:Object.fromEntries(DT_TRAITS.map(t=>[DT_INFO[t].name, round2(r.mean[t]||0)])),
    percentiles:Object.fromEntries(DT_TRAITS.map(t=>[DT_INFO[t].name, r.pct[t]||0])) }; }
  if(q==="mbti"){ return { type:r.full, axes:Object.fromEntries(Object.keys(r.axes||{}).map(ax=>[ax,{letter:r.axes[ax].letter, lean_pct:r.axes[ax].lean}])) }; }
  if(q==="rice"){ return { purity_score:r.score, items_done:r.yes }; }
  return { style:STYLES[r.style].name, anxiety:round2(r.anxiety), avoidance:round2(r.avoidance) };
}
function buildProfileAnalysis(name){
  const lc=name.toLowerCase();
  const entries=loadProfiles().filter(p=>(p.name||"").toLowerCase()===lc);
  const quizzes=entries.map(p=>{
    const q=p.quiz||"attachment";
    let rows=[]; try{ rows=answerRows(q, p.answers||[]); }catch(e){ rows=[]; }
    return { quiz:QUIZZES[q].title, saved_at:p.saved_at||null, result:analysisDetail(p),
      answers:rows.map((row,i)=>({n:i+1, question:row.q, answer:row.a})) };
  });
  return {
    profile: entries.length?entries[0].name:name,
    source: "Sarah personality & relationship quiz suite",
    instructions_for_analysis: "Below are this person's self-reflection quiz results, each with computed scores and their individual answers. Please analyze their personality, relationship style, strengths, blind spots, and how the results fit together.",
    quizzes
  };
}
async function copyProfileJSON(name){
  const json=JSON.stringify(buildProfileAnalysis(name), null, 2);
  try{
    await navigator.clipboard.writeText(json);
    toast("Copied "+name+"’s profile as JSON — paste into ChatGPT.");
  }catch(e){ showJSONModal(name, json); }
}
function showJSONModal(name, json){
  const backdrop=document.createElement("div"); backdrop.className="modal-backdrop";
  const box=document.createElement("div"); box.className="modal";
  box.innerHTML='<h3>'+escapeHtml(name)+'’s profile (JSON)</h3>'+
    '<p class="result-sub" style="margin:0 0 10px">Copy this and paste it into ChatGPT for analysis.</p>'+
    '<textarea readonly class="json-out"></textarea>'+
    '<div class="modal-actions"><button class="text-btn" id="json-close">Close</button><button class="primary-btn" id="json-copy">Copy</button></div>';
  backdrop.appendChild(box); document.body.appendChild(backdrop);
  const ta=box.querySelector(".json-out"); ta.value=json;
  box.querySelector("#json-close").onclick=()=>backdrop.remove();
  box.querySelector("#json-copy").onclick=()=>{ ta.select(); try{ document.execCommand("copy"); toast("Copied."); }catch(e){} };
  backdrop.onclick=e=>{ if(e.target===backdrop) backdrop.remove(); };
  ta.focus(); ta.select();
}

// ════════════════════════════════════════════════════════════════════
//  EXPORT / IMPORT
// ════════════════════════════════════════════════════════════════════
function exportProfiles(){
  const data=JSON.stringify({version:PROFILES_VERSION, profiles:loadProfiles()}, null, 2);
  const blob=new Blob([data],{type:"application/json"}); const url=URL.createObjectURL(blob);
  const a=document.createElement("a"); a.href=url; a.download="profiles.json"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
}
function importProfiles(){ $("file-import").click(); }
function handleImportFile(file){
  const reader=new FileReader();
  reader.onload=()=>{
    let imported; try{ const d=JSON.parse(reader.result); imported=Array.isArray(d.profiles)?d.profiles:(Array.isArray(d)?d:null); }catch(e){ imported=null; }
    if(!imported){ openDialog({title:"Couldn’t import", message:"That file isn’t a valid profiles.json export."}); return; }
    const profiles=loadProfiles(); let added=0,updated=0;
    imported.forEach(p=>{ if(!p||!p.name) return; const idx=profiles.findIndex(q=>(q.name||"").toLowerCase()===p.name.toLowerCase() && (q.quiz||"attachment")===(p.quiz||"attachment")); if(idx>=0){profiles[idx]=p;updated++;}else{profiles.push(p);added++;} });
    writeProfiles(profiles); showProfiles();
    openDialog({title:"Import complete", message:"Imported "+added+" new, "+updated+" updated."});
  };
  reader.readAsText(file);
}
$("file-import").addEventListener("change", function(){ if(this.files&&this.files[0]) handleImportFile(this.files[0]); this.value=""; });

// ════════════════════════════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════════════════════════════
document.addEventListener("keydown",(e)=>{
  if(e.metaKey||e.ctrlKey||e.altKey) return;
  if($("screen-quiz").classList.contains("hidden")) return;
  if(document.querySelector(".modal-backdrop")) return;
  const quiz=QUIZZES[active]; if(!quiz) return;
  if(quiz.type==="likert"){ if(e.key>="1"&&e.key<="5"){ selectAnswer(Number(e.key)); e.preventDefault(); } }
  else { const q=quiz.questions[current]; if(e.key==="1"){selectAnswer(q.a.lang);e.preventDefault();} else if(e.key==="2"){selectAnswer(q.b.lang);e.preventDefault();} }
  if(e.key==="Backspace"){ goBack(); e.preventDefault(); }
});

showHome();
initAuth();
